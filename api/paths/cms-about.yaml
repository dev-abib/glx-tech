get-about:
  get:
    tags: ["11 — CMS — About Us"]
    summary: Get About Us section
    description: Returns the About Us section content.
    responses:
      "200":
        description: About Us section fetched successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiResponse"
                - properties:
                    data:
                      nullable: true
                      allOf:
                        - $ref: "#/components/schemas/AboutUs"
create-about:
  post:
    tags: ["11 — CMS — About Us"]
    summary: Create About Us section (Admin only)
    description: Creates the About Us section. Only one section can exist. Supports image uploads and per-service icon uploads (multipart/form-data).
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [title, description]
            properties:
              title:
                type: string
                minLength: 3
                maxLength: 300
                description: About Us title
              description:
                type: string
                minLength: 10
                maxLength: 10000
                description: About Us description text
              services:
                type: string
                description: JSON string of services array with description fields (icon and iconPublicId are set via file upload)
              image1:
                type: string
                format: binary
                description: First about image (jpg, png, webp)
              image2:
                type: string
                format: binary
                description: Second about image (jpg, png, webp)
              serviceIcon_0:
                type: string
                format: binary
                description: Icon image for the first service (jpg, png, webp, svg)
              serviceIcon_1:
                type: string
                format: binary
                description: Icon image for the second service (jpg, png, webp, svg)
    responses:
      "201":
        description: About Us section created successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiResponse"
                - properties:
                    data:
                      $ref: "#/components/schemas/AboutUs"
      "409":
        description: About Us section already exists
update-about:
  put:
    tags: ["11 — CMS — About Us"]
    summary: Update About Us section (Admin only)
    description: Updates the About Us section by ID. Supports optional image and service icon uploads.
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: About Us ID
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              title:
                type: string
                minLength: 3
                maxLength: 300
                description: Updated about section title
              description:
                type: string
                minLength: 10
                maxLength: 10000
                description: Updated about section description
              services:
                type: string
                description: JSON string of services array (include existing icon/iconPublicId to keep them, or omit icon for file-upload replacement)
              image1:
                type: string
                format: binary
                description: New first about image (jpg, png, webp)
              image2:
                type: string
                format: binary
                description: New second about image (jpg, png, webp)
              serviceIcon_0:
                type: string
                format: binary
                description: New icon image for the first service (jpg, png, webp, svg)
              serviceIcon_1:
                type: string
                format: binary
                description: New icon image for the second service (jpg, png, webp, svg)
    responses:
      "200":
        description: About Us section updated successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiResponse"
                - properties:
                    data:
                      $ref: "#/components/schemas/AboutUs"
      "404":
        description: About Us section not found
delete-about-image:
  delete:
    tags: ["11 — CMS — About Us"]
    summary: Delete About Us image (Admin only)
    description: Deletes a specific image (image1 or image2) from the About Us section by ID.
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: About Us ID
      - name: image
        in: query
        required: true
        schema:
          type: string
          enum: [image1, image2]
        description: Which image to delete
    responses:
      "200":
        description: Image deleted successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiResponse"
                - properties:
                    data:
                      $ref: "#/components/schemas/AboutUs"
      "400":
        description: Invalid image field
      "404":
        description: About Us section not found
