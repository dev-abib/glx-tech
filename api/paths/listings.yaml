update-listing:
  put:
    tags: ["14 — Listings & Reviews"]
    summary: Update listing (Owner/Seller only)
    description: Updates a listing by ID. Only the listing owner can update.
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Listing ID
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              title:
                type: string
                minLength: 3
                maxLength: 200
                description: Updated listing title
              slug:
                type: string
                description: Updated URL-friendly slug (kebab-case)
              serviceId:
                type: string
                format: uuid
                description: Updated service category ID
              description:
                type: string
                minLength: 10
                maxLength: 5000
                description: Updated listing description
              basePrice:
                type: string
                description: Updated base price as a numeric string
              hourlyPrice:
                type: string
                description: Updated hourly rate as a numeric string
              dailyPrice:
                type: string
                description: Updated daily rate as a numeric string
              estimatedDuration:
                type: string
                description: Updated estimated duration
              isAvailable:
                type: string
                description: "Updated availability (send \"true\" or \"false\")"
              genericData:
                type: string
                description: "Optional updated arbitrary data as a JSON string (e.g. '{\"customField\": \"value\"}')"
              media:
                type: array
                items:
                  type: string
                  format: binary
                description: New media files to upload (replaces existing)
    responses:
      "200":
        description: Listing updated successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiResponse"
                - properties:
                    data:
                      $ref: "#/components/schemas/Listing"
      "403":
        description: Forbidden — Not the listing owner
      "404":
        description: Listing not found
delete-listing:
  delete:
    tags: ["14 — Listings & Reviews"]
    summary: Delete listing (Owner/Seller only)
    description: Deletes a listing by ID. Only the listing owner can delete.
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Listing ID
    responses:
      "200":
        description: Listing deleted successfully
      "403":
        description: Forbidden — Not the listing owner
      "404":
        description: Listing not found
