create-listing:
  post:
    tags: ["14 — Listings & Reviews"]
    summary: Create a new listing (Seller only)
    description: Creates a new seller listing. Supports media file uploads (multipart/form-data).
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required:
              - title
              - slug
              - serviceId
              - description
              - addressId
              - basePrice
              - estimatedDuration
              - isAvailable
            properties:
              title:
                type: string
                minLength: 3
                maxLength: 200
                description: Listing title
              slug:
                type: string
                description: URL-friendly slug (kebab-case)
              serviceId:
                type: string
                format: uuid
                description: "Service category ID — must be one of the service IDs assigned to your seller account"
              description:
                type: string
                minLength: 10
                maxLength: 5000
                description: Listing description
              addressId:
                type: string
                format: uuid
                description: ID of the seller's stored address (will be geocoded for lat/lng)
              basePrice:
                type: string
                description: Base price as a numeric string
              hourlyPrice:
                type: string
                description: Hourly rate as a numeric string
              dailyPrice:
                type: string
                description: Daily rate as a numeric string
              estimatedDuration:
                type: string
                description: Estimated duration (e.g. "2 weeks", "3 hours")
              isAvailable:
                type: string
                description: "Availability status (send \"true\" or \"false\")"
              genericData:
                type: string
                description: "Optional additional arbitrary data as a JSON string (e.g. '{\"customField\": \"value\"}')"
              media:
                type: array
                items:
                  type: string
                  format: binary
                description: Media files to upload (jpg, png, webp; max 5MB each)
    responses:
      "201":
        description: Listing created successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiResponse"
                - properties:
                    data:
                      $ref: "#/components/schemas/Listing"
      "400":
        description: Validation error
      "401":
        description: Unauthorized
get-all-listings:
  get:
    tags: ["14 — Listings & Reviews"]
    summary: Get all listings (Public)
    description: Returns a paginated list of all available listings.
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 10
          maximum: 50
      - name: search
        in: query
        schema:
          type: string
        description: Search keyword for title or description
      - name: serviceId
        in: query
        schema:
          type: string
        description: Filter by service ID
      - name: serviceName
        in: query
        schema:
          type: string
        description: Filter by service name
      - name: address
        in: query
        schema:
          type: string
        description: Filter by address
      - name: minPrice
        in: query
        schema:
          type: number
        description: Minimum price filter
      - name: maxPrice
        in: query
        schema:
          type: number
        description: Maximum price filter
      - name: lat
        in: query
        schema:
          type: number
        description: Latitude for location-based search
      - name: lng
        in: query
        schema:
          type: number
        description: Longitude for location-based search
      - name: radius
        in: query
        schema:
          type: number
          default: 10
        description: Search radius in km
      - name: minRating
        in: query
        schema:
          type: number
        description: Minimum rating filter
      - name: isAvailable
        in: query
        schema:
          type: string
          enum: ["true", "false"]
        description: Filter by availability
      - name: sortBy
        in: query
        schema:
          type: string
          default: createdAt
        description: Sort field
      - name: sortOrder
        in: query
        schema:
          type: string
          enum: [asc, desc]
          default: desc
        description: Sort order
    responses:
      "200":
        description: Listings fetched successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiResponse"
                - properties:
                    data:
                      type: object
                      properties:
                        listings:
                          type: array
                          items:
                            $ref: "#/components/schemas/Listing"
                        pagination:
                          $ref: "#/components/schemas/Pagination"
