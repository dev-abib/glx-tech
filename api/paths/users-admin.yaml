gt-all-users:
  get:
    tags: ["05 — Users — Admin"]
    summary: Get all users (Admin only)
    description: Returns a paginated list of all users. Accessible only by admin or super_admin roles.
    security:
      - bearerAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
        description: Page number
      - name: limit
        in: query
        schema:
          type: integer
          default: 10
          maximum: 50
        description: Items per page
    responses:
      "200":
        description: Users fetched successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/common.yaml#/ApiResponse"
                - properties:
                    data:
                      type: object
                      properties:
                        users:
                          type: array
                          items:
                            $ref: "../components/schemas/user.yaml#/SafeUser"
                        pagination:
                          $ref: "../components/schemas/common.yaml#/Pagination"
      "401":
        description: Unauthorized
      "403":
        description: Forbidden — Admin access required
