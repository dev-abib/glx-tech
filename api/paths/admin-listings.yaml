get-all-listings:
  get:
    tags: ["16 — Admin — Listings & Reviews"]
    summary: Get all listings (Admin view)
    description: Returns a paginated list of all listings. Admin only.
    security:
      - bearerAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 10
          maximum: 50
      - name: search
        in: query
        schema:
          type: string
        description: Search keyword for title or description
      - name: serviceId
        in: query
        schema:
          type: string
        description: Filter by service ID
      - name: sortBy
        in: query
        schema:
          type: string
          default: createdAt
        description: Sort field
      - name: sortOrder
        in: query
        schema:
          type: string
          enum: [asc, desc]
          default: desc
        description: Sort order
    responses:
      "200":
        description: Listings fetched successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiResponse"
                - properties:
                    data:
                      type: object
                      properties:
                        listings:
                          type: array
                          items:
                            $ref: "#/components/schemas/Listing"
                        pagination:
                          $ref: "#/components/schemas/Pagination"
      "401":
        description: Unauthorized
      "403":
        description: Forbidden — Admin access required
get-listing-by-slug:
  get:
    tags: ["16 — Admin — Listings & Reviews"]
    summary: Get listing by slug (Admin view)
    description: Returns a single listing by slug. Admin only.
    security:
      - bearerAuth: []
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
        description: Listing slug
    responses:
      "200":
        description: Listing fetched successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiResponse"
                - properties:
                    data:
                      $ref: "#/components/schemas/Listing"
      "401":
        description: Unauthorized
      "403":
        description: Forbidden — Admin access required
      "404":
        description: Listing not found
get-listing-reviews:
  get:
    tags: ["16 — Admin — Listings & Reviews"]
    summary: Get reviews for a listing (Admin view)
    description: Returns all reviews for a specific listing. Admin only.
    security:
      - bearerAuth: []
    parameters:
      - name: listingId
        in: path
        required: true
        schema:
          type: string
        description: Listing ID
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 10
          maximum: 50
    responses:
      "200":
        description: Reviews fetched successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiResponse"
                - properties:
                    data:
                      type: object
                      properties:
                        reviews:
                          type: array
                          items:
                            $ref: "#/components/schemas/UserReview"
                        pagination:
                          $ref: "#/components/schemas/Pagination"
      "401":
        description: Unauthorized
      "403":
        description: Forbidden — Admin access required
      "404":
        description: Listing not found
