get-dashboard-trends:
  get:
    tags: ["17 — Admin — Dashboard"]
    summary: Get dashboard trends (Admin only)
    description: Returns dashboard trend data for the admin panel.
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Dashboard trends fetched successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiResponse"
                - properties:
                    data:
                      type: object
                      properties:
                        totalUsers:
                          type: integer
                        totalListings:
                          type: integer
                        totalReviews:
                          type: integer
                        totalInquiries:
                          type: integer
                        newUsersToday:
                          type: integer
                        newListingsToday:
                          type: integer
      "401":
        description: Unauthorized
      "403":
        description: Forbidden — Admin access required
