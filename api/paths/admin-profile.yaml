get-me:
  get:
    tags: ["07 — Admin — Profile"]
    summary: Get admin profile
    description: Returns the profile of the currently authenticated admin/super_admin user.
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Admin profile fetched successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/common.yaml#/ApiResponse"
                - properties:
                    data:
                      $ref: "../components/schemas/admin.yaml#/AdminProfile"
      "401":
        description: Unauthorized
      "403":
        description: Forbidden
update-me:
  put:
    tags: ["07 — Admin — Profile"]
    summary: Update admin profile
    description: Updates the admin's own profile. Supports optional avatar upload (multipart/form-data).
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              name:
                type: string
                minLength: 3
                maxLength: 100
                description: Admin's full name
              email:
                type: string
                format: email
                description: New email address
              phone:
                type: string
                description: Phone number
              avatar:
                type: string
                format: binary
                description: Avatar image (jpg, png, webp; max 5MB)
    responses:
      "200":
        description: Profile updated successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/common.yaml#/ApiResponse"
                - properties:
                    data:
                      $ref: "../components/schemas/admin.yaml#/AdminProfile"
      "400":
        description: Validation error
      "401":
        description: Unauthorized
change-password:
  post:
    tags: ["07 — Admin — Profile"]
    summary: Change admin password
    description: Changes the authenticated admin's password.
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas/admin.yaml#/AdminChangePasswordInput"
    responses:
      "200":
        description: Password changed successfully
      "401":
        description: Invalid old password or unauthorized
get-user:
  get:
    tags: ["07 — Admin — Profile"]
    summary: Get user by ID (Admin only)
    description: Returns a single user/admin by their ID. Requires admin or super_admin role.
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: User ID
    responses:
      "200":
        description: User fetched successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/common.yaml#/ApiResponse"
                - properties:
                    data:
                      $ref: "../components/schemas/admin.yaml#/AdminProfile"
      "404":
        description: User not found
delete-user:
  delete:
    tags: ["07 — Admin — Profile"]
    summary: Delete a user (Admin only)
    description: Deletes a regular user by ID. Super admins can also delete admins via this endpoint.
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: User ID to delete
    responses:
      "200":
        description: User deleted successfully
      "403":
        description: Forbidden — Cannot delete admins
      "404":
        description: User not found
