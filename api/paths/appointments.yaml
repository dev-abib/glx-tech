create-appointment:
  post:
    tags: ["19 — Appointments"]
    summary: Create a new appointment (Buyer)
    description: Books a time slot on a listing. The booking time is locked — no two non-cancelled appointments can exist for the same listing + time slot.
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas/appointment.yaml#/CreateAppointmentInput"
    responses:
      "201":
        description: Appointment created successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/common.yaml#/ApiResponse"
                - properties:
                    data:
                      $ref: "../components/schemas/appointment.yaml#/Appointment"
      "400":
        description: Invalid booking time or listing unavailable
      "401":
        description: Unauthorized
      "404":
        description: Listing not found
      "409":
        description: Time slot already booked

get-my-bookings:
  get:
    tags: ["19 — Appointments"]
    summary: Get my bookings (Buyer)
    description: Returns all appointments made by the authenticated user as a buyer.
    security:
      - bearerAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 10
          maximum: 50
    responses:
      "200":
        description: Buyer appointments fetched successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/common.yaml#/ApiResponse"
                - properties:
                    data:
                      type: object
                      properties:
                        appointments:
                          type: array
                          items:
                            $ref: "../components/schemas/appointment.yaml#/Appointment"
                        pagination:
                          $ref: "../components/schemas/common.yaml#/Pagination"
      "401":
        description: Unauthorized

seller-get-my-appointments:
  get:
    tags: ["19 — Appointments"]
    summary: Get my appointments as seller
    description: Returns all appointments received on the authenticated seller's listings.
    security:
      - bearerAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          default: 10
          maximum: 50
    responses:
      "200":
        description: Seller appointments fetched successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/common.yaml#/ApiResponse"
                - properties:
                    data:
                      type: object
                      properties:
                        appointments:
                          type: array
                          items:
                            $ref: "../components/schemas/appointment.yaml#/Appointment"
                        pagination:
                          $ref: "../components/schemas/common.yaml#/Pagination"
      "401":
        description: Unauthorized

get-booked-times:
  get:
    tags: ["19 — Appointments"]
    summary: Get booked times for a listing (Public)
    description: Returns an array of booked slots for a specific listing. If a date is provided, filters to that date. Useful for frontend to grey out unavailable slots.
    parameters:
      - name: listingId
        in: path
        required: true
        schema:
          type: string
        description: Listing ID
      - name: date
        in: query
        required: false
        schema:
          type: string
          example: "2026-07-15"
        description: Filter by date (YYYY-MM-DD). If omitted, returns all booked slots.
    responses:
      "200":
        description: Booked times fetched successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/common.yaml#/ApiResponse"
                - properties:
                    data:
                      $ref: "../components/schemas/appointment.yaml#/BookedTimes"
      "404":
        description: Listing not found

update-appointment-status:
  patch:
    tags: ["19 — Appointments"]
    summary: Update appointment status
    description: |
      Update the status of an appointment.
      - **Seller** can confirm or complete
      - **Buyer or Seller** can cancel
    security:
      - bearerAuth: []
    parameters:
      - name: appointmentId
        in: path
        required: true
        schema:
          type: string
        description: Appointment ID
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../components/schemas/appointment.yaml#/UpdateAppointmentStatusInput"
    responses:
      "200":
        description: Appointment status updated successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/schemas/common.yaml#/ApiResponse"
                - properties:
                    data:
                      $ref: "../components/schemas/appointment.yaml#/Appointment"
      "400":
        description: Invalid status transition
      "401":
        description: Unauthorized
      "403":
        description: Forbidden — Not authorized to update this appointment
      "404":
        description: Appointment not found
