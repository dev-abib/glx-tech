quick-donate:
  get:
    tags: ["20 — Donations"]
    summary: Quick donate — get Stripe Checkout URL
    description: Creates a Stripe Checkout Session with custom amount and returns the checkout URL. The client should redirect the user to the returned `checkoutUrl`. No payload required — the donor enters amount/name/email on Stripe's hosted page. Public endpoint - no authentication required.
    responses:
      "200":
        description: Checkout session created successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiResponse"
                - properties:
                    data:
                      $ref: "#/components/schemas/DonationCheckoutResponse"

create-donation:
  post:
    tags: ["20 — Donations"]
    summary: Create a donation payment link
    description: Generates a Stripe payment link for donations. Public endpoint - no authentication required.
    requestBody:
      required: false
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CreateDonationInput"
    responses:
      "201":
        description: Payment link created successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiResponse"
                - properties:
                    data:
                      $ref: "#/components/schemas/DonationPaymentLinkResponse"

get-donations:
  get:
    tags: ["20 — Donations"]
    summary: Get all completed donations
    description: Returns a paginated list of completed donations. Public endpoint - no authentication required.
    parameters:
      - in: query
        name: page
        schema:
          type: integer
          default: 1
        description: Page number
      - in: query
        name: limit
        schema:
          type: integer
          default: 10
        description: Items per page (max 50)
    responses:
      "200":
        description: Donations fetched successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiResponse"
                - properties:
                    data:
                      $ref: "#/components/schemas/DonationListResponse"

get-donation-stats:
  get:
    tags: ["20 — Donations"]
    summary: Get donation statistics
    description: Returns aggregate donation statistics (total count, total amount, recent donations). Public endpoint - no authentication required.
    responses:
      "200":
        description: Donation stats fetched successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiResponse"
                - properties:
                    data:
                      $ref: "#/components/schemas/DonationStatsResponse"

stripe-webhook:
  post:
    tags: ["20 — Donations"]
    summary: Stripe webhook handler
    description: Handles Stripe webhook events (checkout.session.completed). Verifies the Stripe signature using the webhook secret. No authentication required — the request body must be the raw JSON payload with a `stripe-signature` header.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            description: Stripe event payload (raw JSON)
    parameters:
      - in: header
        name: stripe-signature
        required: true
        schema:
          type: string
        description: Stripe webhook signature for event verification
    responses:
      "200":
        description: Webhook received successfully
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiResponse"
      "400":
        description: Missing stripe-signature header or signature verification failed
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApiError"

get-my-subscription:
  get:
    tags: ["21 — Plans & Subscriptions"]
    summary: Get my subscription details (Authenticated)
    description: Returns the authenticated user's current subscription plan, status, renewal date, and billing cycle.
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Subscription fetched successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiResponse"
                - properties:
                    data:
                      type: object
                      properties:
                        plan:
                          type: object
                          nullable: true
                          properties:
                            id:
                              type: string
                            name:
                              type: string
                            slug:
                              type: string
                            description:
                              type: string
                              nullable: true
                            priceMonthly:
                              type: integer
                            priceAnnual:
                              type: integer
                            maxActiveListings:
                              type: integer
                            maxFeaturedListings:
                              type: integer
                            platformFeePercent:
                              type: number
                            enabledFeatures:
                              type: array
                              items:
                                type: string
                        subscriptionStatus:
                          type: string
                          nullable: true
                        currentPeriodEnd:
                          type: string
                          format: date-time
                          nullable: true
                        billingCycle:
                          type: string
                          nullable: true
                          enum: [monthly, annual]
                        isActive:
                          type: boolean
                        hasStripeSubscription:
                          type: boolean
                        hasStripeCustomer:
                          type: boolean
      "401":
        description: Unauthorized

cancel-subscription:
  post:
    tags: ["21 — Plans & Subscriptions"]
    summary: Cancel subscription (Authenticated)
    description: Cancels the authenticated user's Stripe subscription at the end of the current billing period.
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Subscription canceled successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiResponse"
                - properties:
                    data:
                      type: object
                      properties:
                        currentPeriodEnd:
                          type: string
                          format: date-time
                          nullable: true
      "400":
        description: No active subscription to cancel or already canceled
      "401":
        description: Unauthorized

renew-subscription:
  post:
    tags: ["21 — Plans & Subscriptions"]
    summary: Renew/reactivate subscription (Authenticated)
    description: Creates a new Stripe Checkout Session to renew or reactivate the authenticated user's current plan subscription.
    security:
      - bearerAuth: []
    responses:
      "201":
        description: Subscription renewal initiated
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiResponse"
                - properties:
                    data:
                      type: object
                      properties:
                        checkoutUrl:
                          type: string
                          description: Stripe Checkout session URL to complete payment
                        sessionId:
                          type: string
                          description: Stripe Checkout session ID
      "400":
        description: No plan assigned or plan unavailable
      "401":
        description: Unauthorized
