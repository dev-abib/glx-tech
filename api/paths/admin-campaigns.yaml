campaigns:
  post:
    tags: ["18 — Admin — Campaigns"]
    summary: Create a new campaign draft (Admin only)
    description: Creates a new email campaign draft. The campaign is created in 'draft' status and must be sent separately.
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CreateCampaignInput"
    responses:
      "201":
        description: Campaign draft created successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiResponse"
                - properties:
                    data:
                      $ref: "#/components/schemas/Campaign"
      "400":
        description: Validation error
      "401":
        description: Unauthorized
  get:
    tags: ["18 — Admin — Campaigns"]
    summary: List all campaigns (Admin only)
    description: Returns a paginated list of all email campaigns.
    security:
      - bearerAuth: []
    parameters:
      - name: page
        in: query
        schema:
          type: integer
          default: 1
        description: Page number
      - name: limit
        in: query
        schema:
          type: integer
          default: 20
          maximum: 50
        description: Items per page
    responses:
      "200":
        description: Campaigns fetched successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiResponse"
                - properties:
                    data:
                      type: object
                      properties:
                        campaigns:
                          type: array
                          items:
                            $ref: "#/components/schemas/Campaign"
                        pagination:
                          $ref: "#/components/schemas/Pagination"
      "401":
        description: Unauthorized

send-campaign:
  post:
    tags: ["18 — Admin — Campaigns"]
    summary: Send a campaign draft (Admin only)
    description: Sends a campaign draft to all newsletter subscribers. The campaign must be in 'draft' status.
    security:
      - bearerAuth: []
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Campaign ID to send
    responses:
      "200":
        description: Campaign sent successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiResponse"
                - properties:
                    data:
                      type: object
                      properties:
                        message:
                          type: string
                          example: Campaign sent successfully
      "400":
        description: Campaign is not a draft or no subscribers
      "401":
        description: Unauthorized
      "404":
        description: Campaign not found

get-subscriber-count:
  get:
    tags: ["18 — Admin — Campaigns"]
    summary: Get newsletter subscriber count (Admin only)
    description: Returns the total number of subscribed newsletter subscribers.
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Subscriber count fetched successfully
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ApiResponse"
                - properties:
                    data:
                      type: object
                      properties:
                        count:
                          type: integer
                          example: 42
      "401":
        description: Unauthorized
