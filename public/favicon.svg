<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Top glow accent -->
  <rect width="32" height="16" rx="7" fill="url(#glow)"/>

  <!-- Hexagon node icon representing "Nexus" (network/connection) -->
  <g filter="url(#shadow)">
    <!-- Outer hexagon ring -->
    <polygon points="16,5 25,10 25,22 16,27 7,22 7,10" fill="none" stroke="#fff" stroke-width="1.2" stroke-linejoin="round"/>

    <!-- Inner hexagon -->
    <polygon points="16,9 22,12 22,20 16,23 10,20 10,12" fill="none" stroke="#c4b5fd" stroke-width="0.8" stroke-linejoin="round"/>

    <!-- Center dot / connection node -->
    <circle cx="16" cy="16" r="2.5" fill="#fff"/>

    <!-- Inner center dot -->
    <circle cx="16" cy="16" r="1" fill="#7c3aed"/>

    <!-- Connection lines from center to inner hexagon vertices -->
    <line x1="16" y1="16" x2="16" y2="9" stroke="#c4b5fd" stroke-width="0.5" opacity="0.6"/>
    <line x1="16" y1="16" x2="22" y2="12" stroke="#c4b5fd" stroke-width="0.5" opacity="0.6"/>
    <line x1="16" y1="16" x2="22" y2="20" stroke="#c4b5fd" stroke-width="0.5" opacity="0.6"/>
    <line x1="16" y1="16" x2="16" y2="23" stroke="#c4b5fd" stroke-width="0.5" opacity="0.6"/>
    <line x1="16" y1="16" x2="10" y2="20" stroke="#c4b5fd" stroke-width="0.5" opacity="0.6"/>
    <line x1="16" y1="16" x2="10" y2="12" stroke="#c4b5fd" stroke-width="0.5" opacity="0.6"/>
  </g>
</svg>
